status_vocabulary: [intake, draft, reviewed, canonical, superseded, archived]
type_vocabulary: [raw, synthesis, library, topic, plan, spec, archive]
field_definitions:
  id: stable document identifier
  path: repository-relative path
  title: human-readable document title
  type: raw, synthesis, library, topic, plan, spec, or archive
  status: intake, draft, reviewed, canonical, superseded, or archived
  topics: capability-domain tags
  source_layer: evidence, conclusion, reading, topic, planning, or metadata
  issue_refs: GitLab issue numbers
  source_refs: upstream evidence documents
  related_docs: sibling or downstream documents
  canonical: current recommended source of truth
  supersedes: document ids replaced by this document
  superseded_by: replacement document id, if any
  created: document or catalog-entry creation date
  updated: last material update date
  last_reviewed: last review date
  confidence: low, medium, or high
  evidence_strength: weak, medium, or strong
  owner: current maintainer
  reviewers: review personas or groups

